services:
  web:
    build: .
    container_name: toiapp_web
    restart: unless-stopped
    depends_on:
      - postgres
    ports:
      - "8000:8000"
    environment:
      DEBUG: "0"
      ALLOWED_HOSTS: "127.0.0.1,localhost,0.0.0.0"
      POSTGRES_DB: "toiapp"
      POSTGRES_USER: "postgres"
      POSTGRES_PASSWORD: "postgres"
      POSTGRES_HOST: "postgres"
      POSTGRES_PORT: "5432"

  postgres:
    image: postgres:16
    container_name: toiapp_postgres
    restart: unless-stopped
    ports:
      - '5432:5432'
    environment:
      POSTGRES_DB: toiapp
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - toiapp_pgdata:/var/lib/postgresql/data

volumes:
  toiapp_pgdata:
